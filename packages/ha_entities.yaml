text_sensor:
  - platform: homeassistant
    id: weather_condition
    entity_id: ${entity_weather}
    internal: true
    on_value:
      then:
        - lambda: id(refresh_dashboard).execute();

  # Large Home Assistant attributes such as weather forecasts or XTB JSON blobs
  # can exceed the heap available to ESPHome text sensors. Keep these IDs local
  # until the HA side exposes compact scalar/template entities.
  - platform: template
    id: weather_forecast
    internal: true
    lambda: return std::string();
    update_interval: never

  - platform: homeassistant
    id: fan_state
    entity_id: ${entity_fan}
    internal: true
    on_value:
      then:
        - lambda: id(refresh_dashboard).execute();

  - platform: template
    id: xtb_summary
    internal: true
    lambda: return std::string();
    update_interval: never

  - platform: template
