sensor:
  - platform: homeassistant
    id: indoor_temperature
    entity_id: ${entity_indoor_temperature}
    internal: true
    on_value:
      then:
        - script.execute: refresh_dashboard

  - platform: homeassistant
    id: indoor_humidity
    entity_id: ${entity_indoor_humidity}
    internal: true
    on_value:
      then:
        - script.execute: refresh_dashboard

  - platform: homeassistant
    id: weather_temperature
    entity_id: ${entity_weather}
    attribute: temperature
    internal: true
    on_value:
      then:
        - script.execute: refresh_dashboard

text_sensor:
  - platform: homeassistant
    id: weather_condition
    entity_id: ${entity_weather}
    internal: true
    on_value:
      then:
        - lambda: id(refresh_dashboard).execute();

  - platform: template
    id: weather_forecast
    internal: true
    lambda: return std::string();
    update_interval: never

  - platform: homeassistant
    id: fan_state
    entity_id: ${entity_fan}
    internal: true
    on_value:
      then:
        - lambda: id(refresh_dashboard).execute();

  - platform: homeassistant
    id: xtb_deskhub_summary
    entity_id: ${entity_xtb_deskhub}
    attribute: summary
    internal: true
    on_value:
      then:
        - lambda: id(refresh_dashboard).execute();

  - platform: homeassistant
    id: xtb_deskhub_rows
    entity_id: ${entity_xtb_deskhub}
    attribute: rows
    internal: true
    on_value:
      then:
        - lambda: id(refresh_dashboard).execute();
