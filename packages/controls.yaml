touchscreen:
  - platform: gt911
    id: touch_panel
    interrupt_pin: GPIO47
    display: epaper_display
    on_touch:
      - lambda: |-
          ESP_LOGI("touch", "Touch x=%d y=%d", touch.x, touch.y);

binary_sensor:
  - platform: gpio
    id: physical_button
    name: "${friendly_name} Button"
    pin:
      number: GPIO21
      inverted: true
      mode:
        input: true
        pullup: true
    on_press:
      - script.execute: refresh_dashboard

button:
  - platform: template
    name: "${friendly_name} Refresh Dashboard"
    on_press:
      - script.execute: refresh_dashboard

  - platform: template
    name: "${friendly_name} Refresh Display"
    on_press:
      - script.execute: refresh_dashboard

  - platform: restart
    name: "${friendly_name} Restart"

  - platform: safe_mode
    name: "${friendly_name} Safe Mode"
