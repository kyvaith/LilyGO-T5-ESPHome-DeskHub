touchscreen:
  - platform: gt911
    id: touch_panel
    interrupt_pin: GPIO47
    display: epaper_display
    on_touch:
      - if:
          condition:
            lambda: |-
              return touch.x >= 216 && touch.x <= 292 && touch.y >= 424 && touch.y <= 466;
          then:
            - homeassistant.service:
                service: fan.turn_on
                data:
                  entity_id: ${entity_fan}
            - delay: 500ms
            - component.update: epaper_display
      - if:
          condition:
            lambda: |-
              return touch.x > 292 && touch.x <= 360 && touch.y >= 424 && touch.y <= 466;
          then:
            - homeassistant.service:
                service: fan.turn_off
                data:
                  entity_id: ${entity_fan}
            - delay: 500ms
            - component.update: epaper_display

binary_sensor:
  - platform: gpio
    id: physical_button
    name: "${friendly_name} Button"
    pin:
      number: GPIO21
      inverted: true
      mode:
        input: true
        pullup: true
    on_press:
      - display.page.show_next: epaper_display
      - component.update: epaper_display

button:
  - platform: template
    name: "${friendly_name} Next Page"
    on_press:
      - display.page.show_next: epaper_display
      - component.update: epaper_display

  - platform: template
    name: "${friendly_name} Refresh Display"
    on_press:
      - component.update: epaper_display

  - platform: restart
    name: "${friendly_name} Restart"

  - platform: safe_mode
    name: "${friendly_name} Safe Mode"
