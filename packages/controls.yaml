touchscreen:
  - platform: gt911
    id: touch_panel
    interrupt_pin: GPIO47
    display: epaper_display
    touch_timeout: 250ms
    calibration:
      x_min: 0
      x_max: 960
      y_min: 0
      y_max: 540
    transform:
      swap_xy: true
      mirror_y: true
    on_release:
      - component.update: desk_lvgl
      - delay: 80ms
      - component.update: epaper_display

binary_sensor:
  - platform: gpio
    id: physical_button
    name: "${friendly_name} Button"
    pin:
      number: GPIO21
      inverted: true
      mode:
        input: true
        pullup: true
    on_press:
      - globals.set:
          id: screen_preserve_armed
          value: "false"
      - lambda: |-
          t5_clear_screen_preserving_sleep();
          t5_set_flash_screen_preserve_armed(false);
          id(epaper_display).resume_updates();
      - script.execute: refresh_dashboard

button:
  - platform: template
    name: "${friendly_name} Refresh Dashboard"
    on_press:
      - globals.set:
          id: screen_preserve_armed
          value: "false"
      - lambda: |-
          t5_clear_screen_preserving_sleep();
          t5_set_flash_screen_preserve_armed(false);
          id(epaper_display).resume_updates();
      - script.execute: refresh_dashboard

  - platform: template
    name: "${friendly_name} Refresh Display"
    on_press:
      - globals.set:
          id: screen_preserve_armed
          value: "false"
      - lambda: |-
          t5_clear_screen_preserving_sleep();
          t5_set_flash_screen_preserve_armed(false);
          id(epaper_display).resume_updates();
      - script.execute: refresh_dashboard

  - platform: template
    name: "${friendly_name} Clean Display"
    on_press:
      - globals.set:
          id: screen_preserve_armed
          value: "false"
      - lambda: |-
          t5_clear_screen_preserving_sleep();
          t5_set_flash_screen_preserve_armed(false);
          id(epaper_display).resume_updates();
      - lambda: |-
          id(epaper_display).clean();
      - delay: 500ms
      - script.execute: refresh_dashboard

  - platform: restart
    name: "${friendly_name} Restart"

  - platform: safe_mode
    name: "${friendly_name} Safe Mode"
