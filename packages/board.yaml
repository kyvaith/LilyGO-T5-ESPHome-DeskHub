esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  build_path: !env_var ESPHOME_BUILD_PATH .b
  on_boot:
    priority: 600
    then:
      - bm8563.read_time: rtc_time
  platformio_options:
    upload_speed: 921600
    monitor_speed: 115200
    board_build.mcu: esp32s3
    board_build.f_cpu: 240000000L
    board_build.arduino.memory_type: qspi_opi
    board_build.flash_size: 16MB
    board_build.flash_mode: qio
    board_build.flash_type: qspi
    board_build.psram_type: opi
    board_build.memory_type: qspi_opi
    board_build.boot_freq: 80m
    build_flags:
      - "-DBOARD_HAS_PSRAM"
      - "-DARDUINO_USB_MODE=1"
      - "-DARDUINO_USB_CDC_ON_BOOT=1"
      - "-DLV_DRAW_SW_CIRCLE_CACHE_SIZE=4"

esp32:
  variant: esp32s3
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: arduino
    advanced:
      loop_task_stack_size: 16384

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO
  baud_rate: 115200
  hardware_uart: USB_SERIAL_JTAG

api:
  homeassistant_services: true
  on_client_connected:
    then:
      - delay: 3s
      - script.execute: fetch_weather_forecast
      - delay: 250ms
      - script.execute: refresh_dashboard

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: LIGHT

external_components:
  - source:
      type: local
      path: components
    components: ["t547"]

i2c:
  id: touch_bus
  sda: GPIO18
  scl: GPIO17
  frequency: 100kHz

time:
  - platform: bm8563
    id: rtc_time
    i2c_id: touch_bus
    timezone: Europe/Warsaw

  - platform: homeassistant
    id: ha_time
    timezone: Europe/Warsaw
    on_time_sync:
      then:
        - bm8563.write_time: rtc_time
