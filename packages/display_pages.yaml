script:
  - id: fetch_weather_forecast
    mode: restart
    then:
      - logger.log:
          level: INFO
          format: "Waiting for Home Assistant forecast client"
      - wait_until:
          timeout: 20s
          condition:
            api.connected:
              state_subscription_only: true
      - logger.log:
          level: INFO
          format: "Requesting weather forecast from Home Assistant"
      - homeassistant.action:
          action: weather.get_forecasts
          data:
            entity_id: ${entity_weather}
            type: daily
          capture_response: true
          response_template: >-
            {%- set payload = response['${entity_weather}'] if '${entity_weather}' in response else response -%}
            {%- set fc = payload['forecast'] | default([]) -%}
            {%- set labels = ['Pn', 'Wt', 'Śr', 'Cz', 'Pt', 'Sb', 'Nd'] -%}
            {%- set out = namespace(value='') -%}
            {%- for offset in range(1, 5) -%}
              {%- set target = now().date() + timedelta(days=offset) -%}
              {%- set day = namespace(hi=none, lo=none, condition='cloudy', found=false) -%}
              {%- for item in fc -%}
                {%- set raw_dt = item.datetime | default(item.date) | default(none) -%}
                {%- if raw_dt is not none -%}
                  {%- set local_dt = as_datetime(raw_dt).astimezone() -%}
                  {%- set dt = local_dt.date() -%}
                {%- else -%}
                  {%- set dt = none -%}
                {%- endif -%}
                {%- if dt is not none and dt == target -%}
                  {%- set day.found = true -%}
                  {%- set hi = item.temperature | default(item.native_temperature) | default(none) | float(none) -%}
                  {%- set lo = item.templow | default(item.native_templow) | default(item.temperature) | default(item.native_temperature) | default(none) | float(none) -%}
                  {%- if hi is not none -%}
                    {%- set day.hi = hi -%}
                  {%- endif -%}
                  {%- if lo is not none -%}
                    {%- set day.lo = lo -%}
                  {%- endif -%}
                  {%- if item.condition is defined -%}
                    {%- set day.condition = item.condition -%}
                  {%- endif -%}
                {%- endif -%}
              {%- endfor -%}
              {%- if out.value -%}{%- set out.value = out.value ~ ';' -%}{%- endif -%}
              {%- set label = labels[target.weekday()] -%}
              {%- if not day.found or day.hi is none or day.lo is none -%}
                {%- set out.value = out.value ~ label ~ '|cloudy|nan|nan' -%}
              {%- else -%}
                {%- set out.value = out.value ~ label ~ '|' ~ day.condition ~ '|' ~ (day.hi | round(0)) ~ '|' ~ (day.lo | round(0)) -%}
              {%- endif -%}
            {%- endfor -%}
            {{ out.value }}
          on_success:
            - lambda: |-
                std::string forecast = response["response"].as<std::string>();
                ESP_LOGI("weather", "Forecast response: %s", forecast.c_str());
                id(weather_forecast).publish_state(forecast);
            - script.execute: guarded_refresh_dashboard
          on_error:
            - lambda: |-
                ESP_LOGW("weather", "Forecast action failed: %s", error.c_str());

  - id: refresh_dashboard
    mode: restart
    then:
      - delay: 350ms
      - logger.log:
          level: DEBUG
          format: "Refreshing LVGL dashboard"
      - lambda: |-
          auto set_label = [](lv_obj_t *label, const std::string &text) {
            const char *current = lv_label_get_text(label);
            if (current != nullptr && text == current) {
              return false;
            }
            lv_obj_invalidate(label);
            lv_label_set_text(label, text.c_str());
            lv_obj_invalidate(label);
            return true;
          };

          auto make_label_opaque = [](lv_obj_t *label) {
            lv_obj_set_style_bg_color(label, lv_color_hex(0xFFFFFF), LV_PART_MAIN);
            lv_obj_set_style_bg_opa(label, LV_OPA_COVER, LV_PART_MAIN);
            lv_obj_set_style_text_color(label, lv_color_hex(0x000000), LV_PART_MAIN);
            lv_obj_set_style_border_width(label, 0, LV_PART_MAIN);
          };

          constexpr int MAX_POSITION_ROWS = 20;
          constexpr int BASE_POSITION_ROWS = 10;
          static lv_obj_t *extra_position_rows[MAX_POSITION_ROWS - BASE_POSITION_ROWS] = {};
          static lv_obj_t *extra_position_names[MAX_POSITION_ROWS - BASE_POSITION_ROWS] = {};
          static lv_obj_t *extra_position_daily[MAX_POSITION_ROWS - BASE_POSITION_ROWS] = {};
          static lv_obj_t *extra_position_profits[MAX_POSITION_ROWS - BASE_POSITION_ROWS] = {};

          auto copy_label_style = [](lv_obj_t *target, lv_obj_t *source) {
            lv_obj_set_style_text_font(target, lv_obj_get_style_text_font(source, LV_PART_MAIN), LV_PART_MAIN);
            lv_obj_set_style_text_color(target, lv_obj_get_style_text_color(source, LV_PART_MAIN), LV_PART_MAIN);
            lv_obj_set_style_bg_color(target, lv_obj_get_style_bg_color(source, LV_PART_MAIN), LV_PART_MAIN);
            lv_obj_set_style_bg_opa(target, lv_obj_get_style_bg_opa(source, LV_PART_MAIN), LV_PART_MAIN);
            lv_obj_set_style_border_width(target, 0, LV_PART_MAIN);
          };

          if (extra_position_rows[0] == nullptr) {
            for (int i = 0; i < MAX_POSITION_ROWS - BASE_POSITION_ROWS; i++) {
              const int row_number = BASE_POSITION_ROWS + i;
              lv_obj_t *row = lv_obj_create(id(positions_list));
              lv_obj_remove_style_all(row);
              lv_obj_set_pos(row, 0, row_number * 29);
              lv_obj_set_size(row, 532, 29);
              lv_obj_set_style_bg_opa(row, LV_OPA_TRANSP, LV_PART_MAIN);
              lv_obj_set_style_border_width(row, 0, LV_PART_MAIN);
              lv_obj_set_style_pad_all(row, 0, LV_PART_MAIN);
              lv_obj_clear_flag(row, LV_OBJ_FLAG_SCROLLABLE);
              lv_obj_clear_flag(row, LV_OBJ_FLAG_CLICKABLE);

              lv_obj_t *name = lv_label_create(row);
              lv_obj_set_pos(name, 18, 4);
              lv_obj_set_size(name, 270, 22);
              lv_label_set_text(name, "");
              lv_label_set_long_mode(name, LV_LABEL_LONG_DOT);
              copy_label_style(name, id(position_name_0));

              lv_obj_t *daily = lv_label_create(row);
              lv_obj_set_pos(daily, 306, 4);
              lv_obj_set_size(daily, 108, 22);
              lv_label_set_text(daily, "");
              lv_obj_set_style_text_align(daily, LV_TEXT_ALIGN_RIGHT, LV_PART_MAIN);
              copy_label_style(daily, id(position_daily_0));

              lv_obj_t *profit = lv_label_create(row);
              lv_obj_set_pos(profit, 424, 4);
              lv_obj_set_size(profit, 90, 22);
              lv_label_set_text(profit, "");
              lv_obj_set_style_text_align(profit, LV_TEXT_ALIGN_RIGHT, LV_PART_MAIN);
              copy_label_style(profit, id(position_profit_0));

              lv_obj_t *separator = lv_obj_create(row);
              lv_obj_remove_style_all(separator);
              lv_obj_set_pos(separator, 0, 28);
              lv_obj_set_size(separator, 532, 1);
              lv_obj_set_style_bg_color(separator, lv_color_hex(0xB8B8B8), LV_PART_MAIN);
              lv_obj_set_style_bg_opa(separator, LV_OPA_COVER, LV_PART_MAIN);
              lv_obj_set_style_border_width(separator, 0, LV_PART_MAIN);
              lv_obj_clear_flag(separator, LV_OBJ_FLAG_SCROLLABLE);
              lv_obj_clear_flag(separator, LV_OBJ_FLAG_CLICKABLE);

              extra_position_rows[i] = row;
              extra_position_names[i] = name;
              extra_position_daily[i] = daily;
              extra_position_profits[i] = profit;
            }
            lv_obj_update_layout(id(positions_list));
          }

          lv_obj_t *opaque_labels[] = {
            id(header_date), id(header_time),
            id(weather_main_icon), id(weather_temp_value), id(weather_temp_unit), id(weather_condition_value),
            id(forecast_icon_0), id(forecast_icon_1), id(forecast_icon_2), id(forecast_icon_3),
            id(forecast_day_0), id(forecast_day_1), id(forecast_day_2), id(forecast_day_3),
            id(forecast_temp_0), id(forecast_temp_1), id(forecast_temp_2), id(forecast_temp_3),
            id(indoor_temp_value), id(indoor_temp_unit), id(indoor_humidity_value),
            id(xtb_balance_value), id(xtb_profit_value), id(xtb_profit_percent_value),
            id(xtb_axis_label_top), id(xtb_axis_label_upper_mid), id(xtb_axis_label_zero), id(xtb_axis_label_bottom),
            id(position_name_0), id(position_name_1), id(position_name_2), id(position_name_3), id(position_name_4),
            id(position_name_5), id(position_name_6), id(position_name_7), id(position_name_8), id(position_name_9),
            id(position_daily_0), id(position_daily_1), id(position_daily_2), id(position_daily_3), id(position_daily_4),
            id(position_daily_5), id(position_daily_6), id(position_daily_7), id(position_daily_8), id(position_daily_9),
            id(position_profit_0), id(position_profit_1), id(position_profit_2), id(position_profit_3), id(position_profit_4),
            id(position_profit_5), id(position_profit_6), id(position_profit_7), id(position_profit_8), id(position_profit_9)
          };
          for (lv_obj_t *label : opaque_labels) {
            make_label_opaque(label);
          }
          for (int i = 0; i < MAX_POSITION_ROWS - BASE_POSITION_ROWS; i++) {
            make_label_opaque(extra_position_names[i]);
            make_label_opaque(extra_position_daily[i]);
            make_label_opaque(extra_position_profits[i]);
          }

          lv_obj_set_style_width(id(xtb_profit_chart), 0, LV_PART_INDICATOR);
          lv_obj_set_style_height(id(xtb_profit_chart), 0, LV_PART_INDICATOR);
          lv_obj_set_style_radius(id(xtb_profit_chart), 0, LV_PART_INDICATOR);
          lv_obj_set_style_bg_opa(id(xtb_profit_chart), LV_OPA_TRANSP, LV_PART_INDICATOR);
          lv_obj_set_pos(id(xtb_profit_chart), 54, 8);
          lv_obj_set_size(id(xtb_profit_chart), 424, 78);
          lv_obj_set_style_pad_all(id(xtb_profit_chart), 0, LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(xtb_profit_chart), lv_color_hex(0xFFFFFF), LV_PART_MAIN);
          lv_obj_set_style_bg_opa(id(xtb_profit_chart), LV_OPA_COVER, LV_PART_MAIN);
          lv_obj_set_style_border_width(id(xtb_profit_chart), 0, LV_PART_MAIN);
          lv_obj_set_style_pad_left(id(xtb_profit_chart), 0, LV_PART_MAIN);
          lv_obj_set_style_line_width(id(xtb_profit_chart), 2, LV_PART_ITEMS);
          lv_obj_set_style_line_color(id(xtb_profit_chart), lv_color_hex(0x000000), LV_PART_ITEMS);
          lv_obj_set_style_width(id(xtb_profit_chart), 0, LV_PART_CURSOR);
          lv_obj_set_style_height(id(xtb_profit_chart), 0, LV_PART_CURSOR);
          lv_obj_set_style_line_width(id(xtb_profit_chart), 1, LV_PART_CURSOR);
          lv_obj_set_style_line_dash_width(id(xtb_profit_chart), 4, LV_PART_CURSOR);
