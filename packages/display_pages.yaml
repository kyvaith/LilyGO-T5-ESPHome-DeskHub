font:
  - file: "gfonts://Inter"
    id: font_micro
    size: 12
    glyphs: &ui_glyphs " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]_abcdefghijklmnopqrstuvwxyz{}|~ąćęłńóśźżĄĆĘŁŃÓŚŹŻ°±"

