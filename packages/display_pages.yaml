      family: Inter
      weight: bold
    id: font_value
    size: 30
    glyphs: *ui_glyphs

  - file:
      type: gfonts
      family: Inter
      weight: bold
    id: font_temp
    size: 56
    glyphs: *ui_glyphs

  - file:
      type: gfonts
