          place_temp_unit(id(font_value), id(indoor_temp_unit), 82, 158, indoor_temp_text);
          set_label(id(indoor_humidity_value), hum(id(indoor_humidity).state));

          lv_obj_t *forecast_days[] = {id(forecast_day_0), id(forecast_day_1), id(forecast_day_2), id(forecast_day_3)};
          lv_obj_t *forecast_icons[] = {id(forecast_icon_0), id(forecast_icon_1), id(forecast_icon_2), id(forecast_icon_3)};
          lv_obj_t *forecast_temps[] = {id(forecast_temp_0), id(forecast_temp_1), id(forecast_temp_2), id(forecast_temp_3)};
          std::string forecast = id(weather_forecast).state;
          for (int i = 0; i < 4; i++) {
            std::string row = delimited_field(forecast, ';', i);
