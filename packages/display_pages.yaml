            if (condition == "partlycloudy" || condition == "partly_cloudy") return std::string("\U000F0595");
            if (condition == "rainy" || condition == "pouring" || condition == "lightning-rainy") return std::string("\U000F0597");
            return std::string("\U000F0590");
          };

          auto forecast_temp = [&](float high, float low) {
