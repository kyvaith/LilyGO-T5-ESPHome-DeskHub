      weight: bold
    id: font_time
    size: 36
    glyphs: *ui_glyphs

  - file: "fonts/materialdesignicons-webfont.ttf"
    id: font_mdi_18
    size: 22
    glyphs: &mdi_glyphs
      - "\U000F00ED" # calendar
      - "\U000F012A" # chart-line
      - "\U000F0210" # fan
      - "\U000F0425" # power
      - "\U000F050F" # thermometer
      - "\U000F058E" # water-percent
      - "\U000F0590" # cloudy
      - "\U000F0595" # partly-cloudy
      - "\U000F0597" # rainy
      - "\U000F0599" # sunny
      - "\U000F06A1" # home-outline
      - "\U000F0741" # gesture-tap
      - "\U000F081F" # finance

  - file: "fonts/materialdesignicons-webfont.ttf"
    id: font_mdi_26
    size: 30
    glyphs: *mdi_glyphs

  - file: "fonts/materialdesignicons-webfont.ttf"
    id: font_mdi_42
    size: 48
    glyphs: *mdi_glyphs

  - file: "fonts/materialdesignicons-webfont.ttf"
    id: font_mdi_64
    size: 72
    glyphs: *mdi_glyphs

image:
  - file: "assets/lvgl-unused.png"
    id: lvgl_unused_image
    type: BINARY

color:
  - id: ink
    red: 0%
    green: 0%
    blue: 0%
  - id: paper
    red: 100%
    green: 100%
    blue: 100%
  - id: line_gray
    red: 72%
    green: 72%
    blue: 72%
  - id: soft_gray
    red: 93%
    green: 93%
    blue: 93%

display:
  - platform: t547
    id: epaper_display
    greyscale: true
    fast_refresh: true
    fast_mono: true
    fast_mono_passes: 4
    fast_mono_threshold: 14
    fast_mono_time: 300
    full_update_every: 0
    partial_threshold_percent: 100
    partial_clear_cycles: 0
    update_interval: never
    auto_clear_enabled: false

lvgl:
  id: desk_lvgl
  displays:
    - epaper_display
  touchscreens:
    - touchscreen_id: touch_panel
  buffer_size: 25%
  draw_rounding: 16
  update_interval: 1s
  update_when_display_idle: false
  log_level: WARN
  byte_order: little_endian
  default_font: font_body
  bg_color: 0xFFFFFF
  text_color: 0x000000
  on_draw_end:
    - logger.log:
        level: DEBUG
        format: "LVGL draw ended; updating e-paper"
    - component.update: epaper_display
  pages:
    - id: dashboard_page
      bg_color: 0xFFFFFF
      scrollable: false
      scrollbar_mode: "off"
