script:
  - id: refresh_dashboard
    mode: restart
    then:
      - logger.log:
          level: DEBUG
          format: "Refreshing LVGL dashboard"
      - lambda: |-
          auto set_label = [](lv_obj_t *label, const std::string &text) {
            const char *current = lv_label_get_text(label);
            if (current != nullptr && text == current) {
              return;
            }
            lv_label_set_text(label, text.c_str());
          };

          auto compact_spaces = [](std::string value) {
            value.erase(std::remove(value.begin(), value.end(), '\r'), value.end());
            value.erase(std::remove(value.begin(), value.end(), '\n'), value.end());
            while (value.find("  ") != std::string::npos) {
              value.replace(value.find("  "), 2, " ");
            }
            return value;
          };

          auto number_from = [](const std::string &text, const std::string &key, float fallback) {
            auto pos = text.find("\"" + key + "\"");
            if (pos == std::string::npos) pos = text.find("'" + key + "'");
            if (pos == std::string::npos) return fallback;
            pos = text.find(':', pos);
            if (pos == std::string::npos) return fallback;
            pos++;
            while (pos < text.size() && (text[pos] == ' ' || text[pos] == '"')) pos++;
            size_t end = pos;
            while (end < text.size() && (isdigit(text[end]) || text[end] == '-' || text[end] == '+' || text[end] == '.' || text[end] == ',')) end++;
            if (end <= pos) return fallback;
            std::string raw = text.substr(pos, end - pos);
            std::replace(raw.begin(), raw.end(), ',', '.');
            return strtof(raw.c_str(), nullptr);
          };

          auto text_from = [](const std::string &text, const std::string &key) {
            auto pos = text.find("\"" + key + "\"");
            if (pos == std::string::npos) pos = text.find("'" + key + "'");
            if (pos == std::string::npos) return std::string();
            pos = text.find(':', pos);
            if (pos == std::string::npos) return std::string();
            pos++;
            while (pos < text.size() && text[pos] == ' ') pos++;
            if (pos >= text.size()) return std::string();
            char quote = text[pos];
            if (quote != '"' && quote != '\'') return std::string();
            pos++;
            size_t end = pos;
            while (end < text.size() && text[end] != quote) {
              if (text[end] == '\\' && end + 1 < text.size()) end++;
              end++;
            }
            if (end <= pos) return std::string();
            return text.substr(pos, end - pos);
          };

          auto nth_object = [](const std::string &text, int wanted) {
            int depth = 0;
            int index = -1;
            size_t start = std::string::npos;
            bool in_string = false;
            char quote = 0;
            for (size_t i = 0; i < text.size(); i++) {
              char c = text[i];
              if (in_string) {
                if (c == '\\') {
                  i++;
                } else if (c == quote) {
                  in_string = false;
                }
                continue;
              }
              if (c == '"' || c == '\'') {
                in_string = true;
                quote = c;
                continue;
              }
              if (c == '{') {
                if (depth == 0) {
                  index++;
                  start = i;
                }
                depth++;
              } else if (c == '}') {
                depth--;
                if (depth == 0 && index == wanted && start != std::string::npos) {
                  return text.substr(start, i - start + 1);
                }
              }
            }
            return std::string();
          };

          auto group_int = [](int value) {
            bool negative = value < 0;
            int abs_value = negative ? -value : value;
            std::string raw = to_string(abs_value);
            std::string out;
            int count = 0;
            for (int i = raw.size() - 1; i >= 0; i--) {
              if (count == 3) {
                out.insert(out.begin(), ' ');
                count = 0;
              }
              out.insert(out.begin(), raw[i]);
              count++;
            }
            if (negative) out.insert(out.begin(), '-');
            return out;
          };

          auto money = [&](float value, const std::string &currency) {
            if (isnan(value)) return std::string("-- ") + currency;
            int rounded = (int) roundf(value);
            std::string prefix = rounded > 0 ? "+" : "";
            return prefix + group_int(rounded) + " " + currency;
          };

          auto plain_money = [&](float value, const std::string &currency) {
            if (isnan(value)) return std::string("-- ") + currency;
            return group_int((int) roundf(value)) + " " + currency;
          };

          auto percent = [](float value) {
            if (isnan(value)) return std::string("--%");
            char buffer[24];
            snprintf(buffer, sizeof(buffer), "%+.1f%%", value);
            std::string out(buffer);
            std::replace(out.begin(), out.end(), '.', ',');
            return out;
          };

          auto temp = [](float value, bool decimal) {
            if (isnan(value)) return std::string("--°C");
            char buffer[24];
            snprintf(buffer, sizeof(buffer), decimal ? "%.1f°C" : "%.0f°C", value);
            std::string out(buffer);
            std::replace(out.begin(), out.end(), '.', ',');
            return out;
          };

          auto hum = [](float value) {
            if (isnan(value)) return std::string("--%");
            char buffer[16];
            snprintf(buffer, sizeof(buffer), "%.0f%%", value);
            return std::string(buffer);
          };

          auto describe_weather = [](std::string condition) {
            if (condition == "sunny") return std::string("Słonecznie");
            if (condition == "partlycloudy" || condition == "partly_cloudy") return std::string("Częściowe zachmurzenie");
            if (condition == "cloudy") return std::string("Zachmurzenie");
            if (condition == "rainy" || condition == "pouring") return std::string("Deszcz");
            if (condition == "snowy") return std::string("Śnieg");
            if (condition == "fog") return std::string("Mgła");
            if (condition == "clear-night") return std::string("Bezchmurnie");
            if (condition.empty() || condition == "unknown" || condition == "unavailable") return std::string("Brak danych");
            condition[0] = toupper(condition[0]);
            return condition;
          };

          auto now = id(ha_time).now();
          if (now.is_valid()) {
            const char *days[] = {"Nd", "Pn", "Wt", "Śr", "Cz", "Pt", "Sb"};
            const char *months[] = {"sty", "lut", "mar", "kwi", "maj", "cze", "lip", "sie", "wrz", "paź", "lis", "gru"};
            char date_buffer[24];
            snprintf(date_buffer, sizeof(date_buffer), "%s, %d %s", days[now.day_of_week - 1], now.day_of_month, months[now.month - 1]);
            char time_buffer[8];
            snprintf(time_buffer, sizeof(time_buffer), "%02d:%02d", now.hour, now.minute);
            set_label(id(header_date), date_buffer);
            set_label(id(header_time), time_buffer);
          }

          set_label(id(weather_temp_value), temp(id(weather_temperature).state, false));
          set_label(id(weather_condition_value), describe_weather(id(weather_condition).state));
          set_label(id(indoor_temp_value), temp(id(indoor_temperature).state, true));
          set_label(id(indoor_humidity_value), hum(id(indoor_humidity).state));

          std::string currency = id(xtb_currency).state;
          if (currency.empty() || currency == "unknown" || currency == "unavailable") currency = "PLN";
          std::string summary = id(xtb_summary).state;
          float balance = id(xtb_balance).state;
          if (isnan(balance)) balance = number_from(summary, "side_bar_account_value", NAN);
          if (isnan(balance)) balance = number_from(summary, "total_equity", NAN);
          float profit = number_from(summary, "profit_net", NAN);
          float profit_percent = number_from(summary, "profit_percent", NAN);
          set_label(id(xtb_balance_value), plain_money(balance, currency));
          set_label(id(xtb_profit_value), money(profit, currency));
          set_label(id(xtb_profit_percent_value), percent(profit_percent));

          static bool chart_seeded = false;
          static int last_chart_minute = -1;
          const int minute_key = now.is_valid() ? (now.hour * 60 + now.minute) : -2;
          const float chart_percent = isnan(profit_percent) ? 0.0f : profit_percent;
          int chart_point = (int) roundf((chart_percent + 10.0f) * 100.0f / 30.0f);
          chart_point = std::max(0, std::min(100, chart_point));
          if (!chart_seeded) {
            for (int i = 0; i < 24; i++) {
              lv_chart_set_value_by_id(id(xtb_profit_chart), id(xtb_profit_series), i, chart_point);
            }
            chart_seeded = true;
            last_chart_minute = minute_key;
            lv_chart_refresh(id(xtb_profit_chart));
          } else if (minute_key != last_chart_minute) {
            lv_chart_set_next_value(id(xtb_profit_chart), id(xtb_profit_series), chart_point);
            last_chart_minute = minute_key;
            lv_chart_refresh(id(xtb_profit_chart));
          }

          static bool fan_initialized = false;
          static bool last_fan_on = false;
          bool fan_on = id(fan_state).state == "on";
          if (!fan_initialized || fan_on != last_fan_on) {
            lv_obj_set_x(id(fan_switch_fill), fan_on ? 0 : 63);
            lv_obj_set_style_text_color(id(fan_on_label), lv_color_hex(fan_on ? 0xFFFFFF : 0x000000), LV_PART_MAIN);
            lv_obj_set_style_text_color(id(fan_off_label), lv_color_hex(fan_on ? 0x000000 : 0xFFFFFF), LV_PART_MAIN);
            fan_initialized = true;
            last_fan_on = fan_on;
          }

          lv_obj_t *rows[] = {
            id(position_row_0), id(position_row_1), id(position_row_2), id(position_row_3), id(position_row_4),
            id(position_row_5), id(position_row_6), id(position_row_7), id(position_row_8), id(position_row_9)
          };
          lv_obj_t *names[] = {
            id(position_name_0), id(position_name_1), id(position_name_2), id(position_name_3), id(position_name_4),
            id(position_name_5), id(position_name_6), id(position_name_7), id(position_name_8), id(position_name_9)
          };
          lv_obj_t *daily[] = {
            id(position_daily_0), id(position_daily_1), id(position_daily_2), id(position_daily_3), id(position_daily_4),
            id(position_daily_5), id(position_daily_6), id(position_daily_7), id(position_daily_8), id(position_daily_9)
          };
          lv_obj_t *profits[] = {
            id(position_profit_0), id(position_profit_1), id(position_profit_2), id(position_profit_3), id(position_profit_4),
            id(position_profit_5), id(position_profit_6), id(position_profit_7), id(position_profit_8), id(position_profit_9)
          };

          std::string positions = id(xtb_positions).state;
          int visible = 0;
          for (int i = 0; i < 10; i++) {
            std::string item = nth_object(positions, i);
            if (item.empty()) {
              lv_obj_add_flag(rows[i], LV_OBJ_FLAG_HIDDEN);
              continue;
            }
            std::string name = text_from(item, "display_name");
            if (name.empty()) name = text_from(item, "name");
            if (name.empty()) name = text_from(item, "symbol");
            if (name.empty()) name = "Pozycja";
            name = compact_spaces(name);
            set_label(names[i], name);
            float daily_change = number_from(item, "daily_change_percent", NAN);
            float row_profit = number_from(item, "profit_loss", NAN);
            if (isnan(row_profit)) row_profit = number_from(item, "profit_net", NAN);
            set_label(daily[i], percent(daily_change));
            set_label(profits[i], money(row_profit, currency));
            lv_obj_clear_flag(rows[i], LV_OBJ_FLAG_HIDDEN);
            visible++;
          }

          if (visible == 0) {
            set_label(id(position_name_0), "Brak danych z XTB");
            set_label(id(position_daily_0), "");
            set_label(id(position_profit_0), "");
            lv_obj_clear_flag(id(position_row_0), LV_OBJ_FLAG_HIDDEN);
            for (int i = 1; i < 10; i++) lv_obj_add_flag(rows[i], LV_OBJ_FLAG_HIDDEN);
          }

          static bool first_render = true;
          if (first_render) {
            lv_obj_invalidate(lv_scr_act());
            first_render = false;
          }
      - component.update: desk_lvgl

esphome:
  on_boot:
    priority: -100
    then:
      - delay: 4s
      - script.execute: refresh_dashboard
      - delay: 500ms
      - component.update: desk_lvgl
      - delay: 500ms
      - component.update: epaper_display

interval:
  - interval: 30s
    then:
      - script.execute: refresh_dashboard
