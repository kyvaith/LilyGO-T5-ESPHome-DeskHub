font:
  - file: "gfonts://Inter"
    id: font_micro
    size: 10
    glyphs: &ui_glyphs " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]_abcdefghijklmnopqrstuvwxyz{}|~ąćęłńóśźżĄĆĘŁŃÓŚŹŻ°±"

  - file: "gfonts://Inter"
    id: font_tiny
    size: 12
    glyphs: *ui_glyphs

  - file: "gfonts://Inter"
    id: font_small
    size: 14
    glyphs: *ui_glyphs

  - file:
      type: gfonts
      family: Inter
      weight: bold
    id: font_small_bold
    size: 14
    glyphs: *ui_glyphs

  - file: "gfonts://Inter"
    id: font_body
    size: 16
    glyphs: *ui_glyphs

  - file:
      type: gfonts
      family: Inter
      weight: bold
    id: font_body_bold
    size: 16
    glyphs: *ui_glyphs

  - file:
      type: gfonts
      family: Inter
      weight: bold
    id: font_section
    size: 18
    glyphs: *ui_glyphs

  - file:
      type: gfonts
      family: Inter
      weight: bold
    id: font_value
    size: 34
    glyphs: *ui_glyphs

  - file:
      type: gfonts
      family: Inter
      weight: bold
    id: font_temp
    size: 56
    glyphs: *ui_glyphs

  - file:
      type: gfonts
      family: Inter
      weight: bold
    id: font_time
    size: 34
    glyphs: *ui_glyphs

color:
  - id: ink
    red: 0%
    green: 0%
    blue: 0%
  - id: paper
    red: 100%
    green: 100%
    blue: 100%
  - id: gray_75
    red: 75%
    green: 75%
    blue: 75%
  - id: gray_58
    red: 58%
    green: 58%
    blue: 58%
  - id: gray_38
    red: 38%
    green: 38%
    blue: 38%

display:
  - platform: t547
    id: epaper_display
    greyscale: true
    fast_refresh: true
    full_update_every: 24
    partial_clear_cycles: 1
    partial_threshold_percent: 72
    rotation: 0
    update_interval: 60s
    pages:
      - id: page_dashboard
        lambda: |-
          auto black = id(ink);
          auto white = id(paper);
          auto gray = id(gray_58);
          auto line_gray = id(gray_75);
          it.fill(white);

          auto line_t = [&](int x1, int y1, int x2, int y2, Color color, int t = 1) {
            for (int i = 0; i < t; i++) {
              it.line(x1, y1 + i, x2, y2 + i, color);
            }
          };
          auto vline_t = [&](int x, int y1, int y2, Color color, int t = 1) {
            for (int i = 0; i < t; i++) {
              it.line(x + i, y1, x + i, y2, color);
            }
          };
          auto round_rect = [&](int x, int y, int w, int h, int r, Color color) {
            int x2 = x + w - 1;
            int y2 = y + h - 1;
            it.line(x + r, y, x2 - r, y, color);
            it.line(x + r, y2, x2 - r, y2, color);
            it.line(x, y + r, x, y2 - r, color);
            it.line(x2, y + r, x2, y2 - r, color);
            for (int dx = 0; dx <= r; dx++) {
              int dy = r - (int) sqrtf((float) (r * r - dx * dx));
              it.draw_pixel_at(x + r - dx, y + dy, color);
              it.draw_pixel_at(x2 - r + dx, y + dy, color);
              it.draw_pixel_at(x + r - dx, y2 - dy, color);
              it.draw_pixel_at(x2 - r + dx, y2 - dy, color);
            }
          };
          auto filled_pill = [&](int x, int y, int w, int h, Color color) {
            int r = h / 2;
            it.filled_rectangle(x + r, y, w - 2 * r, h, color);
            it.filled_circle(x + r, y + r, r, color);
            it.filled_circle(x + w - r - 1, y + r, r, color);
          };
          auto outline_pill = [&](int x, int y, int w, int h, Color color) {
            int r = h / 2;
            it.line(x + r, y, x + w - r - 1, y, color);
            it.line(x + r, y + h - 1, x + w - r - 1, y + h - 1, color);
            it.circle(x + r, y + r, r, color);
            it.circle(x + w - r - 1, y + r, r, color);
          };
          auto fmt_decimal = [&](float value, int decimals, const char *unit) -> std::string {
            if (isnan(value)) {
              return std::string("--") + unit;
            }
            char fmt[10];
            char buf[32];
            snprintf(fmt, sizeof(fmt), "%%.%df", decimals);
            snprintf(buf, sizeof(buf), fmt, value);
            std::string out(buf);
            for (char &c : out) {
              if (c == '.') c = ',';
            }
            out += unit;
            return out;
          };
          auto signed_decimal = [&](float value, int decimals, const char *unit) -> std::string {
            std::string out = fmt_decimal(value, decimals, unit);
            if (!isnan(value) && value > 0) {
              out.insert(0, "+");
            }
            return out;
          };
          auto group_int = [](long value) -> std::string {
            bool neg = value < 0;
            unsigned long v = neg ? (unsigned long) -value : (unsigned long) value;
            std::string s = std::to_string(v);
            for (int i = (int) s.length() - 3; i > 0; i -= 3) {
              s.insert((size_t) i, " ");
            }
            if (neg) s.insert(0, "-");
            return s;
          };
          auto money = [&](float value, const std::string &currency, bool sign = false) -> std::string {
            if (isnan(value)) {
              return "-- " + currency;
            }
            long rounded = lroundf(value);
            std::string out = group_int(rounded);
            if (sign && rounded > 0) out.insert(0, "+");
            out += " ";
            out += currency;
            return out;
          };
          auto number_after = [](const std::string &src, const char *key, float fallback) -> float {
            size_t pos = src.find(key);
            if (pos == std::string::npos) return fallback;
            pos = src.find(':', pos);
            if (pos == std::string::npos) return fallback;
            pos++;
            while (pos < src.size() && (src[pos] == ' ' || src[pos] == '"' || src[pos] == '\'')) pos++;
            std::string raw;
            while (pos < src.size()) {
              char c = src[pos++];
              if ((c >= '0' && c <= '9') || c == '-' || c == '+' || c == '.' || c == ',') {
                raw.push_back(c == ',' ? '.' : c);
              } else if (!raw.empty()) {
                break;
              }
            }
            if (raw.empty()) return fallback;
            return atof(raw.c_str());
          };
          auto nth_number_after = [&](const std::string &src, const char *key, int index, float fallback) -> float {
            size_t pos = 0;
            const size_t key_len = std::string(key).length();
            for (int i = 0; i <= index; i++) {
              pos = src.find(key, pos);
              if (pos == std::string::npos) return fallback;
              if (i == index) {
                return number_after(src.substr(pos), key, fallback);
              }
              pos += key_len;
            }
            return fallback;
          };
          auto nth_object = [](const std::string &src, int index) -> std::string {
            size_t pos = 0;
            for (int i = 0; i <= index; i++) {
              pos = src.find('{', pos);
              if (pos == std::string::npos) return "";
              int depth = 0;
              size_t end = pos;
              for (; end < src.size(); end++) {
                if (src[end] == '{') depth++;
                if (src[end] == '}') {
                  depth--;
                  if (depth == 0) break;
                }
              }
              if (end == std::string::npos || end >= src.size()) return "";
              if (i == index) return src.substr(pos, end - pos + 1);
              pos = end + 1;
            }
            return "";
          };
          auto field_text = [](const std::string &obj, const char *key, const char *fallback) -> std::string {
            size_t pos = obj.find(key);
            if (pos == std::string::npos) return fallback;
            pos = obj.find(':', pos);
            if (pos == std::string::npos) return fallback;
            pos++;
            while (pos < obj.size() && (obj[pos] == ' ' || obj[pos] == '"' || obj[pos] == '\'')) pos++;
            std::string out;
            while (pos < obj.size()) {
              char c = obj[pos++];
              if (c == '"' || c == '\'' || c == ',' || c == '}') break;
              out.push_back(c);
            }
            while (!out.empty() && out.back() == ' ') out.pop_back();
            if (out.empty() || out == "None" || out == "null") return fallback;
            return out;
          };
          auto truncate = [](std::string value, size_t limit) -> std::string {
            if (value.length() <= limit) return value;
            return value.substr(0, limit - 1) + ".";
          };
          auto condition_lines = [](const std::string &condition, std::string &l1, std::string &l2) {
            if (condition.find("partly") != std::string::npos || condition.find("partlycloudy") != std::string::npos) {
              l1 = "Częściowe";
              l2 = "zachmurzenie";
            } else if (condition.find("cloud") != std::string::npos) {
              l1 = "Zachmurzenie";
              l2 = "";
            } else if (condition.find("rain") != std::string::npos || condition.find("pour") != std::string::npos) {
              l1 = "Deszcz";
              l2 = "";
            } else if (condition.find("sun") != std::string::npos || condition.find("clear") != std::string::npos) {
              l1 = "Słonecznie";
              l2 = "";
            } else if (condition.empty() || condition == "unknown" || condition == "unavailable") {
              l1 = "Brak danych";
              l2 = "";
            } else {
              l1 = condition;
              l2 = "";
            }
          };
          auto draw_weather_icon = [&](int x, int y, int scale) {
            int s = scale;
            line_t(x + 36*s, y + 2*s, x + 36*s, y + 14*s, black, 2);
            line_t(x + 7*s, y + 36*s, x + 20*s, y + 36*s, black, 2);
            line_t(x + 13*s, y + 13*s, x + 22*s, y + 22*s, black, 2);
            line_t(x + 13*s, y + 59*s, x + 22*s, y + 50*s, black, 2);
            it.circle(x + 36*s, y + 36*s, 22*s, black);
            it.filled_circle(x + 48*s, y + 54*s, 22*s, white);
            it.filled_circle(x + 30*s, y + 60*s, 15*s, white);
            it.filled_rectangle(x + 30*s, y + 54*s, 52*s, 28*s, white);
            it.circle(x + 48*s, y + 54*s, 22*s, black);
            it.circle(x + 30*s, y + 60*s, 15*s, black);
            line_t(x + 30*s, y + 75*s, x + 80*s, y + 75*s, black, 2);
          };
          auto draw_small_weather = [&](int cx, int cy, int variant) {
            if (variant == 2) {
              it.circle(cx, cy, 11, black);
              line_t(cx, cy - 20, cx, cy - 15, black, 1);
              line_t(cx, cy + 15, cx, cy + 20, black, 1);
              line_t(cx - 20, cy, cx - 15, cy, black, 1);
              line_t(cx + 15, cy, cx + 20, cy, black, 1);
              line_t(cx - 14, cy - 14, cx - 10, cy - 10, black, 1);
              line_t(cx + 10, cy + 10, cx + 14, cy + 14, black, 1);
              line_t(cx - 14, cy + 14, cx - 10, cy + 10, black, 1);
              line_t(cx + 10, cy - 10, cx + 14, cy - 14, black, 1);
            } else {
              if (variant == 0) {
                it.circle(cx - 11, cy - 5, 12, black);
                line_t(cx - 11, cy - 23, cx - 11, cy - 18, black, 1);
                line_t(cx - 29, cy - 5, cx - 24, cy - 5, black, 1);
                line_t(cx - 24, cy - 18, cx - 20, cy - 14, black, 1);
              }
              it.filled_circle(cx + 6, cy + 2, 14, white);
              it.filled_circle(cx - 9, cy + 7, 10, white);
              it.filled_rectangle(cx - 10, cy + 2, 34, 18, white);
              it.circle(cx + 6, cy + 2, 14, black);
              it.circle(cx - 9, cy + 7, 10, black);
              line_t(cx - 9, cy + 17, cx + 25, cy + 17, black, 1);
              if (variant == 1) {
                line_t(cx - 8, cy + 26, cx - 12, cy + 32, black, 1);
                line_t(cx + 6, cy + 26, cx + 2, cy + 34, black, 1);
                line_t(cx + 20, cy + 26, cx + 16, cy + 32, black, 1);
              }
            }
          };
          auto draw_house_icon = [&]() {
            it.circle(55, 326, 16, black);
            it.line(47, 328, 55, 320, black);
            it.line(55, 320, 63, 328, black);
            it.rectangle(49, 328, 12, 11, black);
            it.rectangle(54, 333, 4, 6, black);
          };
          auto draw_thermo = [&]() {
            it.circle(71, 389, 8, black);
            it.filled_circle(71, 389, 4, black);
            it.rectangle(67, 352, 8, 32, black);
            it.filled_rectangle(70, 359, 2, 29, black);
          };
          auto draw_drop = [&]() {
            it.line(260, 352, 244, 382, black);
            it.line(260, 352, 276, 382, black);
            it.circle(260, 383, 17, black);
            it.filled_rectangle(244, 366, 33, 18, white);
            it.line(244, 382, 276, 382, black);
            it.line(252, 391, 246, 386, black);
          };
          auto draw_fan = [&]() {
            it.circle(61, 444, 4, black);
            it.circle(61, 430, 9, black);
            it.circle(75, 444, 9, black);
            it.circle(61, 458, 9, black);
            it.circle(47, 444, 9, black);
          };
          auto draw_invest_icon = [&]() {
            it.circle(428, 86, 16, black);
            it.rectangle(421, 90, 4, 8, black);
            it.rectangle(428, 84, 4, 14, black);
            it.rectangle(435, 78, 4, 20, black);
          };
          auto draw_spark = [&](int x, int y, int w, int h, int pattern) {
            const int pts[5][12] = {
              {8, 7, 9, 6, 8, 5, 6, 7, 5, 4, 3, 1},
              {5, 4, 6, 3, 2, 4, 8, 7, 9, 8, 7, 7},
              {6, 5, 7, 5, 4, 6, 5, 8, 7, 5, 4, 2},
              {8, 6, 7, 5, 6, 8, 7, 4, 3, 4, 2, 1},
              {3, 6, 9, 8, 7, 8, 6, 5, 3, 4, 6, 8}
            };
            int px = x;
            int py = y + pts[pattern][0] * h / 10;
            for (int i = 1; i < 12; i++) {
              int nx = x + i * w / 11;
              int ny = y + pts[pattern][i] * h / 10;
              it.line(px, py, nx, ny, black);
              px = nx;
              py = ny;
            }
          };

          const char *days[] = {"Nd", "Pn", "Wt", "Śr", "Czw", "Pt", "Sob"};
          const char *months[] = {"sty", "lut", "mar", "kwi", "maj", "cze", "lip", "sie", "wrz", "paź", "lis", "gru"};
          auto now = id(ha_time).now();
          char date_buf[24] = "--";
          if (now.is_valid()) {
            snprintf(date_buf, sizeof(date_buf), "%s, %u %s", days[now.day_of_week - 1], now.day_of_month, months[now.month - 1]);
          }

          float weather_temp = id(weather_temperature).state;
          float indoor_temp = id(indoor_temperature).state;
          float indoor_hum = id(indoor_humidity).state;
          std::string condition = id(weather_condition).state;
          std::string condition_l1;
          std::string condition_l2;
          condition_lines(condition, condition_l1, condition_l2);

          std::string currency = id(xtb_currency).state;
          if (currency.empty() || currency == "unknown" || currency == "unavailable") currency = "PLN";
          std::string summary = id(xtb_summary).state;
          float balance = id(xtb_balance).state;
          float profit = number_after(summary, "profit_net", NAN);
          if (isnan(profit)) profit = number_after(summary, "position_profit_net", NAN);
          float profit_pct = number_after(summary, "profit_percent", NAN);
          bool fan_on = id(fan_state).state == "on";

          line_t(27, 46, 768, 46, black, 1);
          it.print(780, 28, id(font_body), black, TextAlign::CENTER_LEFT, date_buf);
          vline_t(847, 20, 45, black, 1);
          it.strftime(864, 12, id(font_time), black, TextAlign::TOP_LEFT, "%H:%M", now);

          round_rect(27, 47, 360, 243, 7, black);
          it.circle(57, 72, 17, black);
          draw_small_weather(57, 72, 0);
          it.print(84, 65, id(font_section), black, "POGODA");
          draw_weather_icon(61, 92, 2);
          it.print(224, 96, id(font_temp), black, fmt_decimal(weather_temp, 0, "°C").c_str());
          it.print(225, 157, id(font_body), black, condition_l1.c_str());
          if (!condition_l2.empty()) {
            it.print(225, 181, id(font_body), black, condition_l2.c_str());
          }
          line_t(38, 197, 376, 197, black, 1);
          round_rect(38, 197, 338, 84, 6, black);
          std::string forecast = id(weather_forecast).state;
          for (int i = 0; i < 4; i++) {
            int x = 38 + i * 84;
            if (i > 0) vline_t(x, 207, 268, gray, 1);
            int day_index = now.is_valid() ? (now.day_of_week - 1 + i + 1) % 7 : (i + 3) % 7;
            it.print(x + 42, 208, id(font_small_bold), black, TextAlign::TOP_CENTER, days[day_index]);
            draw_small_weather(x + 42, 242, i == 1 ? 1 : (i == 2 ? 2 : 0));
            float high = nth_number_after(forecast, "temperature", i, NAN);
            float low = nth_number_after(forecast, "templow", i, NAN);
            if (isnan(high)) high = weather_temp + (i == 2 ? 3 : (i == 1 ? -1 : 1));
            if (isnan(low)) low = high - 8;
            char day_buf[28];
            snprintf(day_buf, sizeof(day_buf), "%.0f°C / %.0f°C", high, low);
            it.print(x + 42, 260, id(font_tiny), black, TextAlign::TOP_CENTER, day_buf);
          }

          round_rect(27, 304, 360, 171, 7, black);
          draw_house_icon();
          it.print(82, 319, id(font_section), black, "DOM");
          draw_thermo();
          it.print(99, 354, id(font_small_bold), black, "TEMPERATURA");
          it.print(99, 373, id(font_value), black, fmt_decimal(indoor_temp, 1, "°C").c_str());
          vline_t(214, 349, 404, gray, 1);
          draw_drop();
          it.print(283, 354, id(font_small_bold), black, "WILGOTNOŚĆ");
          it.print(292, 373, id(font_value), black, fmt_decimal(indoor_hum, 0, "%").c_str());
          line_t(38, 414, 376, 414, black, 1);
          draw_fan();
          it.print(99, 440, id(font_body_bold), black, "WENTYLATOR");
          outline_pill(221, 431, 136, 31, black);
          if (fan_on) {
            filled_pill(221, 431, 72, 31, black);
            it.print(257, 437, id(font_body_bold), white, TextAlign::TOP_CENTER, "ON");
            it.print(323, 437, id(font_body_bold), black, TextAlign::TOP_CENTER, "OFF");
          } else {
            filled_pill(287, 431, 70, 31, black);
            it.print(257, 437, id(font_body_bold), black, TextAlign::TOP_CENTER, "ON");
            it.print(323, 437, id(font_body_bold), white, TextAlign::TOP_CENTER, "OFF");
          }

          round_rect(402, 60, 531, 415, 7, black);
          draw_invest_icon();
          it.print(451, 75, id(font_section), black, "INWESTYCJE");
          it.print(450, 108, id(font_small), black, "SALDO");
          it.print(450, 127, id(font_value), black, money(balance, currency, false).c_str());
          vline_t(600, 100, 143, gray, 1);
          it.print(660, 108, id(font_small), black, TextAlign::TOP_CENTER, "ZYSK");
          it.print(660, 127, id(font_value), black, TextAlign::TOP_CENTER, money(profit, currency, true).c_str());
          vline_t(768, 100, 143, gray, 1);
          it.print(846, 108, id(font_small), black, TextAlign::TOP_CENTER, "ZYSK %");
          it.print(846, 127, id(font_value), black, TextAlign::TOP_CENTER, signed_decimal(profit_pct, 1, "%").c_str());
          line_t(412, 158, 920, 158, gray, 1);
          it.print(416, 171, id(font_small_bold), black, "ZYSK W CZASIE");
          int chart_x = 448;
          int chart_y = 190;
          int chart_w = 465;
          int chart_h = 92;
          line_t(chart_x, chart_y + 26, chart_x + chart_w, chart_y + 26, line_gray, 1);
          line_t(chart_x, chart_y + 55, chart_x + chart_w, chart_y + 55, black, 1);
          line_t(chart_x, chart_y + 82, chart_x + chart_w, chart_y + 82, line_gray, 1);
          for (int x = chart_x; x < chart_x + chart_w; x += 8) {
            it.draw_pixel_at(x, chart_y + 1, gray);
            it.draw_pixel_at(x, chart_y + 28, gray);
            it.draw_pixel_at(x, chart_y + 83, gray);
          }
          it.print(414, chart_y - 4, id(font_small), black, "+20%");
          it.print(421, chart_y + 28, id(font_small), black, "+10%");
          it.print(430, chart_y + 55, id(font_small), black, "0%");
          it.print(415, chart_y + 82, id(font_small), black, "-10%");
          const int chart_pts[] = {55, 60, 62, 70, 62, 58, 49, 57, 55, 61, 49, 42, 47, 38, 38, 30, 39, 47, 32, 24, 22, 28, 18, 14, 7, 12, 6, 2};
          int last_x = chart_x + 4;
          int last_y = chart_y + chart_pts[0];
          for (int i = 1; i < 28; i++) {
            int x = chart_x + 4 + i * (chart_w - 8) / 27;
            int y = chart_y + chart_pts[i];
            line_t(last_x, last_y, x, y, black, 2);
            last_x = x;
            last_y = y;
          }
          it.print(chart_x + 14, chart_y + 88, id(font_tiny), black, "7 cze");
          it.print(chart_x + 132, chart_y + 88, id(font_tiny), black, "14 cze");
          it.print(chart_x + 240, chart_y + 88, id(font_tiny), black, "21 cze");
          it.print(chart_x + 348, chart_y + 88, id(font_tiny), black, "28 cze");
          it.print(chart_x + 435, chart_y + 88, id(font_tiny), black, "5 lip");

          int table_y = 303;
          line_t(402, table_y, 933, table_y, black, 1);
          it.print(420, table_y + 9, id(font_small_bold), black, "INSTRUMENT");
          it.print(725, table_y + 9, id(font_small_bold), black, TextAlign::TOP_CENTER, "DZIENNA ZMIANA %");
          it.print(880, table_y + 9, id(font_small_bold), black, TextAlign::TOP_CENTER, "ZYSK");
          line_t(402, table_y + 33, 933, table_y + 33, black, 1);
          const char *fallback_names[] = {"NVDA", "KGHM", "NEWAG", "ETF S&P500", "Alphabet"};
          float fallback_daily[] = {2.45f, -0.82f, 1.15f, 0.35f, -1.10f};
          float fallback_profit[] = {6240.0f, -1230.0f, 980.0f, 4560.0f, -1120.0f};
          std::string positions = id(xtb_positions).state;
          for (int i = 0; i < 5; i++) {
            int y = table_y + 34 + i * 28;
            line_t(402, y + 28, 933, y + 28, line_gray, 1);
            std::string obj = nth_object(positions, i);
            std::string name = field_text(obj, "display_name", fallback_names[i]);
