          std::string currency = "PLN";
          std::string deskhub_summary = id(xtb_deskhub_summary).state;
          float balance = NAN;
          float profit = NAN;
          float profit_percent = NAN;
          if (valid_text(deskhub_summary)) {
            float compact_balance = float_from_text(delimited_field(deskhub_summary, '|', 0), NAN);
            float compact_profit = float_from_text(delimited_field(deskhub_summary, '|', 1), NAN);
            float compact_profit_percent = float_from_text(delimited_field(deskhub_summary, '|', 2), NAN);
            std::string compact_currency = delimited_field(deskhub_summary, '|', 3);
            if (!isnan(compact_balance)) balance = compact_balance;
            if (!isnan(compact_profit)) profit = compact_profit;
            if (!isnan(compact_profit_percent)) profit_percent = compact_profit_percent;
            if (valid_text(compact_currency)) currency = compact_currency;
          }
          set_label(id(xtb_balance_value), plain_money(balance, currency));
          set_label(id(xtb_profit_value), money(profit, currency));
          set_label(id(xtb_profit_percent_value), percent(profit_percent));

          static bool chart_seeded = false;
          static int last_chart_minute = -1;
          static float chart_values[24] = {};
          const int minute_key = now.is_valid() ? (now.hour * 60 + now.minute) : -2;
          const bool chart_value_valid = std::isfinite(profit_percent);

          auto save_chart_history = [&]() {
            char buffer[256];
            size_t offset = snprintf(buffer, sizeof(buffer), "v2:");
            for (int i = 0; i < 24; i++) {
              int written = snprintf(buffer + offset, sizeof(buffer) - offset, "%s%.2f", i == 0 ? "" : ",",
                                     chart_values[i]);
              if (written <= 0 || static_cast<size_t>(written) >= sizeof(buffer) - offset) {
                return;
              }
              offset += static_cast<size_t>(written);
            }
            id(xtb_chart_history) = std::string(buffer);
          };

          auto load_chart_history = [&]() {
            const std::string &history = id(xtb_chart_history);
            if (history.empty() || history.compare(0, 3, "v2:") != 0) {
              return false;
            }
            float parsed[24] = {};
            int index = 0;
            size_t start = 3;
            while (start <= history.size() && index < 24) {
              size_t end = history.find(',', start);
              std::string token = history.substr(start, end == std::string::npos ? std::string::npos : end - start);
              if (token.empty()) {
                return false;
              }
              char *parse_end = nullptr;
              float value = strtof(token.c_str(), &parse_end);
              if (parse_end == token.c_str() || *parse_end != '\0') {
                return false;
              }
              parsed[index++] = value;
              if (end == std::string::npos) {
                break;
              }
              start = end + 1;
            }
            if (index != 24) {
              return false;
            }
            int first_valid = -1;
            for (int i = 0; i < 24; i++) {
              if (std::isfinite(parsed[i])) {
                first_valid = i;
                break;
              }
            }
            if (first_valid < 0) {
              return false;
            }
            for (int i = 0; i < first_valid; i++) {
              parsed[i] = parsed[first_valid];
            }
            float previous = parsed[first_valid];
            for (int i = first_valid + 1; i < 24; i++) {
              if (std::isfinite(parsed[i])) {
                previous = parsed[i];
              } else {
                parsed[i] = previous;
              }
            }
            for (int i = 0; i < 24; i++) {
              chart_values[i] = parsed[i];
            }
            return true;
          };

          auto render_chart = [&]() {
            float min_value = NAN;
            float max_value = NAN;
            float sorted_values[24] = {};
            int valid_points = 0;
            for (int i = 0; i < 24; i++) {
              if (!std::isfinite(chart_values[i])) continue;
              if (valid_points == 0) {
                min_value = chart_values[i];
                max_value = chart_values[i];
              } else {
                if (chart_values[i] < min_value) min_value = chart_values[i];
                if (chart_values[i] > max_value) max_value = chart_values[i];
              }
              sorted_values[valid_points] = chart_values[i];
              valid_points++;
            }

            float chart_top = 20.0f;
            float chart_bottom = -10.0f;
            float chart_center = 5.0f;
            if (valid_points > 0) {
              std::sort(sorted_values, sorted_values + valid_points);
              float scale_min = min_value;
              float scale_max = max_value;
              if (valid_points >= 8) {
                const float q1 = sorted_values[(valid_points - 1) / 4];
                const float q3 = sorted_values[(3 * (valid_points - 1)) / 4];
                const float iqr = std::max(0.05f, q3 - q1);
                scale_min = std::max(min_value, q1 - 1.5f * iqr);
                scale_max = std::min(max_value, q3 + 1.5f * iqr);
              }

              float center_sum = 0.0f;
              int center_points = 0;
              for (int i = 0; i < valid_points; i++) {
                if (sorted_values[i] < scale_min || sorted_values[i] > scale_max) continue;
                center_sum += sorted_values[i];
                center_points++;
              }
              chart_center = center_points > 0 ? center_sum / center_points : (scale_min + scale_max) / 2.0f;
              float required_half_span = 0.25f;
              for (int i = 0; i < valid_points; i++) {
                if (sorted_values[i] < scale_min || sorted_values[i] > scale_max) continue;
                required_half_span = std::max(required_half_span, fabsf(sorted_values[i] - chart_center) * 1.25f);
              }

              auto nice_step = [](float value) {
                if (value <= 0.0f || isnan(value)) return 1.0f;
                const float exponent = floorf(log10f(value));
                const float magnitude = powf(10.0f, exponent);
                const float normalized = value / magnitude;
                float nice = 1.0f;
                if (normalized <= 1.0f) {
                  nice = 1.0f;
                } else if (normalized <= 2.0f) {
                  nice = 2.0f;
                } else if (normalized <= 5.0f) {
                  nice = 5.0f;
                } else {
                  nice = 10.0f;
                }
                return nice * magnitude;
              };

              const float step = nice_step(required_half_span / 2.0f);
              const float half_span = ceilf(required_half_span / step) * step;
              chart_bottom = chart_center - half_span;
              chart_top = chart_center + half_span;
            }

            const float chart_span = chart_top - chart_bottom;
            const int axis_decimals = chart_span < 10.0f ? 1 : 0;

            set_label(id(xtb_axis_label_top), axis_percent(chart_top, axis_decimals));
            set_label(id(xtb_axis_label_upper_mid), axis_percent(chart_top - chart_span / 3.0f, axis_decimals));
            set_label(id(xtb_axis_label_zero), axis_percent(chart_top - chart_span * 2.0f / 3.0f, axis_decimals));
            set_label(id(xtb_axis_label_bottom), axis_percent(chart_bottom, axis_decimals));

            lv_obj_update_layout(id(xtb_profit_chart));
            int32_t pad_top = lv_obj_get_style_pad_top(id(xtb_profit_chart), LV_PART_MAIN);
            int32_t pad_bottom = lv_obj_get_style_pad_bottom(id(xtb_profit_chart), LV_PART_MAIN);
            int32_t chart_h = lv_obj_get_height(id(xtb_profit_chart));
            int32_t plot_h = std::max<int32_t>(1, chart_h - pad_top - pad_bottom);
            const bool zero_visible = chart_bottom <= 0.0f && chart_top >= 0.0f;
            lv_obj_set_style_line_opa(id(xtb_profit_chart), zero_visible ? LV_OPA_60 : LV_OPA_TRANSP, LV_PART_CURSOR);
            if (zero_visible) {
              int32_t zero_y = pad_top + (int32_t) roundf(((chart_top - 0.0f) * plot_h) / chart_span);
              lv_point_t zero_point;
              zero_point.x = 0;
              zero_point.y = zero_y;
              lv_chart_set_cursor_pos(id(xtb_profit_chart), id(xtb_zero_cursor), &zero_point);
            }

            lv_obj_invalidate(id(xtb_chart_area));
            lv_obj_invalidate(id(xtb_profit_chart));
            lv_chart_set_all_values(id(xtb_profit_chart), id(xtb_profit_series), LV_CHART_POINT_NONE);
            for (int i = 0; i < 24; i++) {
              if (!std::isfinite(chart_values[i])) continue;
              float scaled = (chart_values[i] - chart_bottom) * 100.0f / chart_span;
              int point = std::max(0, std::min(100, (int) roundf(scaled)));
              lv_chart_set_value_by_id(id(xtb_profit_chart), id(xtb_profit_series), i, point);
            }
            ESP_LOGD("xtb.chart", "data=%.2f..%.2f mean=%.2f axis=%.2f..%.2f points=%d first=%.2f last=%.2f",
                     min_value, max_value, chart_center, chart_bottom, chart_top, valid_points,
                     valid_points > 0 ? chart_values[0] : NAN,
                     valid_points > 0 ? chart_values[23] : NAN);
            lv_chart_refresh(id(xtb_profit_chart));
            lv_obj_invalidate(id(xtb_profit_chart));
            lv_obj_invalidate(id(xtb_chart_area));
          };

          if (!chart_seeded) {
            bool restored_chart = load_chart_history();
            if (!restored_chart && chart_value_valid) {
              for (int i = 0; i < 24; i++) {
                chart_values[i] = profit_percent;
              }
            } else if (restored_chart && chart_value_valid) {
              chart_values[23] = profit_percent;
            }
            if (restored_chart || chart_value_valid) {
              if (chart_value_valid) {
                save_chart_history();
              }
              chart_seeded = true;
              last_chart_minute = minute_key;
              render_chart();
            }
          } else if (chart_value_valid) {
            if (minute_key >= 0 && minute_key != last_chart_minute) {
              for (int i = 0; i < 23; i++) {
                chart_values[i] = chart_values[i + 1];
              }
            }
            chart_values[23] = profit_percent;
            save_chart_history();
            last_chart_minute = minute_key;
            render_chart();
          } else if (chart_seeded) {
            render_chart();
          }

          static bool fan_initialized = false;
          static bool last_fan_on = false;
          bool fan_on = id(fan_state).state == "on";
          if (!fan_initialized || fan_on != last_fan_on) {
            lv_obj_t *fan_matrix = id(fan_mode_matrix)->obj;
            lv_obj_invalidate(fan_matrix);
            if (fan_on) {
              lv_buttonmatrix_clear_button_ctrl(fan_matrix, id(fan_off_button), LV_BUTTONMATRIX_CTRL_CHECKED);
              lv_buttonmatrix_set_button_ctrl(fan_matrix, id(fan_on_button), LV_BUTTONMATRIX_CTRL_CHECKED);
              lv_buttonmatrix_set_selected_button(fan_matrix, id(fan_on_button));
            } else {
              lv_buttonmatrix_clear_button_ctrl(fan_matrix, id(fan_on_button), LV_BUTTONMATRIX_CTRL_CHECKED);
              lv_buttonmatrix_set_button_ctrl(fan_matrix, id(fan_off_button), LV_BUTTONMATRIX_CTRL_CHECKED);
              lv_buttonmatrix_set_selected_button(fan_matrix, id(fan_off_button));
            }
            lv_obj_invalidate(fan_matrix);
            fan_initialized = true;
            last_fan_on = fan_on;
          }

          lv_obj_t *rows[] = {
            id(position_row_0), id(position_row_1), id(position_row_2), id(position_row_3), id(position_row_4),
            id(position_row_5), id(position_row_6), id(position_row_7), id(position_row_8), id(position_row_9),
            extra_position_rows[0], extra_position_rows[1], extra_position_rows[2], extra_position_rows[3], extra_position_rows[4],
            extra_position_rows[5], extra_position_rows[6], extra_position_rows[7], extra_position_rows[8], extra_position_rows[9]
          };
          lv_obj_t *names[] = {
            id(position_name_0), id(position_name_1), id(position_name_2), id(position_name_3), id(position_name_4),
            id(position_name_5), id(position_name_6), id(position_name_7), id(position_name_8), id(position_name_9),
            extra_position_names[0], extra_position_names[1], extra_position_names[2], extra_position_names[3], extra_position_names[4],
            extra_position_names[5], extra_position_names[6], extra_position_names[7], extra_position_names[8], extra_position_names[9]
          };
          lv_obj_t *daily[] = {
            id(position_daily_0), id(position_daily_1), id(position_daily_2), id(position_daily_3), id(position_daily_4),
            id(position_daily_5), id(position_daily_6), id(position_daily_7), id(position_daily_8), id(position_daily_9),
            extra_position_daily[0], extra_position_daily[1], extra_position_daily[2], extra_position_daily[3], extra_position_daily[4],
            extra_position_daily[5], extra_position_daily[6], extra_position_daily[7], extra_position_daily[8], extra_position_daily[9]
          };
          lv_obj_t *profits[] = {
            id(position_profit_0), id(position_profit_1), id(position_profit_2), id(position_profit_3), id(position_profit_4),
            id(position_profit_5), id(position_profit_6), id(position_profit_7), id(position_profit_8), id(position_profit_9),
            extra_position_profits[0], extra_position_profits[1], extra_position_profits[2], extra_position_profits[3], extra_position_profits[4],
            extra_position_profits[5], extra_position_profits[6], extra_position_profits[7], extra_position_profits[8], extra_position_profits[9]
          };

          const std::string &deskhub_rows = id(xtb_deskhub_rows).state;
          const bool use_deskhub_rows = valid_text(deskhub_rows);

          struct PositionDisplayRow {
            std::string name;
            float daily;
            float profit;
          };
          static PositionDisplayRow display_rows[MAX_POSITION_ROWS];
          for (int i = 0; i < MAX_POSITION_ROWS; i++) {
            display_rows[i].name.clear();
            display_rows[i].daily = NAN;
            display_rows[i].profit = NAN;
          }

          int visible = 0;
          for (int i = 0; i < MAX_POSITION_ROWS; i++) {
            std::string name;
            float daily_change = NAN;
            float row_profit = NAN;
            if (use_deskhub_rows) {
              std::string row = delimited_field(deskhub_rows, ';', i);
              if (valid_text(row)) {
                name = delimited_field(row, '|', 0);
                daily_change = float_from_text(delimited_field(row, '|', 1), NAN);
                row_profit = float_from_text(delimited_field(row, '|', 2), NAN);
              }
            }
            name = compact_spaces(name);
            if (!valid_text(name) && isnan(daily_change) && isnan(row_profit)) {
              continue;
            }
            if (!valid_text(name)) name = std::string("Pozycja ") + to_string(i + 1);
            display_rows[visible].name = name;
            display_rows[visible].daily = daily_change;
            display_rows[visible].profit = row_profit;
            visible++;
            if (visible >= MAX_POSITION_ROWS) break;
          }

          for (int i = 0; i < visible - 1; i++) {
            for (int j = i + 1; j < visible; j++) {
              float a = isnan(display_rows[i].profit) ? -1000000000.0f : display_rows[i].profit;
              float b = isnan(display_rows[j].profit) ? -1000000000.0f : display_rows[j].profit;
              if (b > a) {
                std::swap(display_rows[i], display_rows[j]);
              }
            }
          }

          for (int i = 0; i < MAX_POSITION_ROWS; i++) {
            if (i < visible) {
              set_label(names[i], display_rows[i].name);
              set_label(daily[i], percent(display_rows[i].daily));
              set_label(profits[i], money(display_rows[i].profit, currency));
              lv_obj_clear_flag(rows[i], LV_OBJ_FLAG_HIDDEN);
            } else {
              set_label(names[i], "");
              set_label(daily[i], "");
              set_label(profits[i], "");
              lv_obj_add_flag(rows[i], LV_OBJ_FLAG_HIDDEN);
            }
          }

          static int xtb_debug_logs = 0;
          if (xtb_debug_logs < 5 || visible == 0) {
            ESP_LOGI("dashboard", "XTB balance=%.2f profit=%.2f profit_pct=%.2f rows=%d deskhub_rows_len=%u row0_name='%s' row0_daily=%.2f row0_profit=%.2f",
                     balance, profit, profit_percent, visible, (unsigned) deskhub_rows.size(),
                     visible > 0 ? display_rows[0].name.c_str() : "",
                     visible > 0 ? display_rows[0].daily : NAN,
                     visible > 0 ? display_rows[0].profit : NAN);
            xtb_debug_logs++;
          }

          if (visible == 0) {
            set_label(id(position_name_0), "Brak danych z XTB");
            set_label(id(position_daily_0), "");
            set_label(id(position_profit_0), "");
            lv_obj_clear_flag(id(position_row_0), LV_OBJ_FLAG_HIDDEN);
            for (int i = 1; i < MAX_POSITION_ROWS; i++) lv_obj_add_flag(rows[i], LV_OBJ_FLAG_HIDDEN);
          }

          static bool first_render = true;
          if (first_render) {
            lv_obj_invalidate(lv_scr_act());
            first_render = false;
          }
          lv_obj_invalidate(lv_scr_act());
          lv_refr_now(id(desk_lvgl).get_disp());
      - component.update: epaper_display

esphome:
  on_boot:
    priority: -100
    then:
      - if:
          condition:
            lambda: |-
              return !id(screen_preserve_armed) && t5_allow_automatic_screen_refresh();
          then:
            - delay: 2s
            - lambda: |-
                id(epaper_display).clean();
            - delay: 2s
            - script.execute: fetch_weather_forecast
            - delay: 1s
            - script.execute: refresh_dashboard
          else:
            - lambda: |-
                id(epaper_display).suspend_updates_for_preserved_screen();
      - script.execute: schedule_battery_sleep

interval:
  - interval: 60s
    then:
      - script.execute: guarded_refresh_dashboard

  - interval: 30min
    then:
      - script.execute: fetch_weather_forecast
